{% extends "base.html" %}
{% load static %}
{% block footer %}{% endblock %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">
            <h2>&lt;Dev/&gt;</h2>
            <p>Sign in to access the dashboard</p>
        </div>

        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input type="text" name="username" id="username" class="form-control" placeholder="Enter your username"
                    required autofocus />
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" name="password" id="password" class="form-control"
                    placeholder="Enter your password" required />
            </div>

            <button type="submit" class="btn btn-primary w-full" style="justify-content:center;margin-top:0.5rem;">
                <i class="fa-solid fa-right-to-bracket"></i> Sign In
            </button>
        </form>

        <p class="text-muted text-center" style="font-size:0.85rem;margin-top:1.5rem;">
            <a href="{% url 'home' %}"><i class="fa-solid fa-arrow-left"></i> Back to Portfolio</a>
        </p>
    </div>
</div>
{% endblock %}
