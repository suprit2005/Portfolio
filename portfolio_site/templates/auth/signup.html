{% extends "base.html" %}
{% load static %}
{% block footer %}{% endblock %}

{% block title %}Sign Up{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">
            <h2>&lt;Dev/&gt;</h2>
            <p>Create an account</p>
        </div>

        <form method="POST" action="{% url 'signup' %}">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input type="text" name="username" id="username" class="form-control" placeholder="Choose a username"
                    required autofocus />
            </div>
            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input type="email" name="email" id="email" class="form-control" placeholder="your@email.com"
                    required />
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" name="password" id="password" class="form-control"
                    placeholder="Create a password" required />
            </div>
            <div class="form-group">
                <label class="form-label" for="password2">Confirm Password</label>
                <input type="password" name="password2" id="password2" class="form-control"
                    placeholder="Repeat your password" required />
            </div>

            <button type="submit" class="btn btn-primary w-full" style="justify-content:center;margin-top:0.5rem;">
                <i class="fa-solid fa-user-plus"></i> Create Account
            </button>
        </form>

        <p class="text-muted text-center" style="font-size:0.85rem;margin-top:1.5rem;">
            Already have an account? <a href="{% url 'login' %}">Sign in</a>
        </p>
        <p class="text-muted text-center" style="font-size:0.85rem;margin-top:0.5rem;">
            <a href="{% url 'home' %}"><i class="fa-solid fa-arrow-left"></i> Back to Portfolio</a>
        </p>
    </div>
</div>
{% endblock %}
